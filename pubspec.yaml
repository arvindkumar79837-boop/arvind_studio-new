name: arvind_studio
description: Mobile IDE like VS Code & Android Studio

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # STATE MANAGEMENT
  get: ^4.7.2

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.2.0

  # STORAGE
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5

  # FILE SYSTEM
  file_picker: ^10.3.2

  # NETWORK
  dio: ^5.9.0
  http: ^1.5.0

  # CODE EDITOR
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

  # TERMINAL
  xterm: ^4.0.0

  # WEBVIEW
  webview_flutter: ^4.13.0

  # UTIL
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
